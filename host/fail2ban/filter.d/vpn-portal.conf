# Fail2Ban filter for databyte vpn-portal login attempts
#
# Monitors journald (vpn-portal.service) for failed login messages.
# Matches both operator (/api/login) and customer (/api/portal/login) endpoints.
#
# Log format produced by app.py:
#   2026-06-23 11:39:15,068 INFO portal login FAIL (no user) ip=1.2.3.4 identity=fake
#   2026-06-23 11:39:15,068 INFO portal login FAIL (inactive customer) ip=1.2.3.4 identity=demo reason=inactive
#   2026-06-23 11:39:15,068 INFO portal login FAIL (bad password) ip=1.2.3.4 identity=demo
#   2026-06-23 11:39:15,068 INFO login FAIL user=admin ip=1.2.3.4

[Definition]

# Match any FAIL message and extract IP
# Format produced by Python logging + journald:
#   Jun 23 12:16:00 vpn-prod-01 vpn-portal[115837]: 2026-06-23 12:16:00,000 INFO portal login FAIL (no user) ip=1.2.3.4 identity=demo-phone
#   Jun 23 12:16:01 vpn-prod-01 vpn-portal[115837]: 2026-06-23 12:16:01,000 INFO portal login FAIL (bad password) ip=5.6.7.8 identity=demo
#   Jun 23 12:16:02 vpn-prod-01 vpn-portal[115837]: 2026-06-23 12:16:02,000 INFO login FAIL user=admin ip=9.10.11.12
# The IP captured by <HOST> is what gets banned.
failregex = INFO\s+(?:portal\s+)?login\s+FAIL\s+.*?ip=<HOST>\b

ignoreregex =
