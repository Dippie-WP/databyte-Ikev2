# databyte VPN portal — AIDE file integrity monitoring config
#
# Monitor: portal code, nginx config, systemd unit, secrets, certs
# Schedule: weekly systemd timer (see host/aide/aide-check.{service,timer})
# Report: stdout (journald) + email to operator via /usr/local/bin/aide-report.sh
#
# Run with:
#   aide --config=/etc/aide/aide.conf  (which includes this file via @@x_include)
#   DO NOT run with --config=THIS_FILE directly — Full rule groups are
#   defined in /etc/aide/aide.conf and won't be visible otherwise.
#
# Rule groups (per AIDE convention, defined in /etc/aide/aide.conf):
#   Full = InodeData+StaticFile  (perms + inode + uid + gid + size + mtime + ctime + hashes)
#   OwnerMode = p+u+g
#   VarDir = OwnerMode+n+growing+s+X (for log dirs that grow)
#
# This file extends /etc/aide/aide.conf (via @@x_include directive at end of that file).
# Add paths to monitor here — they'll be picked up by the weekly check.

# Critical portal files — must not change without operator knowing
/opt/vpn-portal Full
/opt/vpn-portal/www Full
/opt/vpn-portal/app.py Full
/opt/vpn-portal/portal_auth.py Full

# Nginx config — must match what's in the repo
/etc/nginx/sites-available/vpn-portal Full
/etc/nginx/sites-enabled/vpn-portal Full
/etc/nginx/conf.d/portal-limits.conf Full

# Systemd unit + drop-ins
/etc/systemd/system/vpn-portal.service Full
/etc/systemd/system/vpn-portal.service.d Full

# Secrets — only perms matter; never re-hash on every run
/etc/vpn-portal.env p+i+n+u+g

# Cloudflare Origin CA cert — must match what's expected
/etc/ssl/cloudflare Full

# strongSwan CA cert + charon config
/opt/strongswan-vpn-gateway/docker/swanctl/x509ca Full
/opt/strongswan-vpn-gateway/docker/swanctl/conf.d Full

# Fail2ban config (relevant if we change filter rules)
#/etc/fail2ban/filter.d/vpn-portal.conf Full
#/etc/fail2ban/jail.d/vpn-portal.local Full

# Exclude: log files, generated state, runtime dirs
!/opt/vpn-portal/__pycache__
!/var/log
!/run
!/tmp
!/proc
!/sys
!/dev
# Exclude specific per-package Debian AIDE rules that catch benign changes
# (these would otherwise cause weekly noise)
!/var/lib/vnstat
!/var/lib/plocate
!/var/lib/mlocate
!/var/lib/systemd/timers/stamp-.*\.timer
!/var/lib/apt
!/var/lib/dpkg
!/var/lib/NetworkManager

# Database file — content is constantly changing (sessions, audit_log, etc.)
# Only check that it's still present (inodes/permissions), not contents.
/var/lib/strongswan/ipsec.db p+i+n+u+g
/var/lib/strongswan/ipsec.db-shm p+i+n+u+g
/var/lib/strongswan/ipsec.db-wal p+i+n+u+g

# Reports stored here (rotate to keep last 12 weeks = 3 months)
/var/lib/aide Full
/var/log/aide Full

# CRITICAL: do NOT include /etc/shadow or /etc/passwd — AIDE complains
# about its own user additions. Already in default /etc/aide/aide.conf.
