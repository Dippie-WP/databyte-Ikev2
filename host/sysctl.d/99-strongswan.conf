# /etc/sysctl.d/99-strongswan.conf
# strongSwan VPN: enable forwarding and harden redirects
#
# Apply with: sudo sysctl --system
# Or: sudo sysctl -p /etc/sysctl.d/99-strongswan.conf
#
# Note: These cannot be applied inside the Docker container. Docker's
# host network namespace whitelists no non-namespaced sysctls. They
# must be set on the LXC host BEFORE the container starts.

net.ipv4.ip_forward = 1
net.ipv6.conf.all.forwarding = 1

# Don't accept ICMP redirects (we're a router, not a host)
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.all.send_redirects = 0
net.ipv4.conf.all.secure_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
net.ipv4.conf.default.send_redirects = 0
net.ipv4.conf.default.secure_redirects = 0
