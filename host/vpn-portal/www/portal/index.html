<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="color-scheme" content="dark light" />
<meta name="referrer" content="no-referrer" />
<meta name="robots" content="noindex, nofollow" />
<title>databyte · Customer Portal</title>
<link rel="stylesheet" href="/static/portal.css?v=BUILD" />
</head>
<body>
<div class="vp-portal">
  <div id="vp-login-view">
    <h1>databyte</h1>
    <div class="vp-subtitle">Customer Portal</div>
    <div class="vp-card">
      <div id="vp-login-error" class="vp-error vp-hidden"></div>
      <form id="vp-login-form" autocomplete="on">
        <label for="vp-identity">EAP Identity</label>
        <input type="text" id="vp-identity" name="identity" autocomplete="username"
               autocapitalize="off" autocorrect="off" spellcheck="false"
               placeholder="e.g. demo-phone" required />
        <label for="vp-password">Password</label>
        <input type="password" id="vp-password" name="password" autocomplete="current-password" required />
        <button type="submit" id="vp-login-btn">Sign in</button>
      </form>
    </div>
    <div class="vp-meta">Use the same credentials you use to connect to the VPN.</div>
  </div>

  <div id="vp-dashboard-view" class="vp-hidden">
    <h1>databyte</h1>
    <div class="vp-subtitle">Customer Portal</div>
    <div class="vp-card">
      <div class="vp-tier" id="vp-tier">Loading...</div>
      <div class="vp-meter">
        <div class="vp-meter-fill" id="vp-meter-fill"></div>
        <div class="vp-meter-text" id="vp-meter-text"></div>
      </div>
      <div class="vp-stats" id="vp-stats"></div>
      <div id="vp-no-cap" class="vp-no-cap vp-hidden">
        <strong>No data cap.</strong> Your account is not metered.
      </div>
    </div>
    <button class="vp-logout" id="vp-logout-btn">Sign out</button>
    <div class="vp-meta" id="vp-meta"></div>
  </div>
</div>
<script src="/static/portal.js?v=BUILD"></script>
</body>
</html>
