# /etc/nginx/sites-available/vpn-portal
# databyte VPN Portal — Cloudflare Origin Cert + Unix socket proxy
# CP4 (HTTPS + security headers) + CP5 (/certs/ static hosting)
# CP6 (no-cache HTML pages — prevent stale `?v=1.4.x` after deploys)
#
# IMPORTANT: per nginx headers_module docs, a child location block with
# add_header RESETS the parent's add_headers. So all add_header directives
# live at server level. The $cache_control map (in portal-limits.conf) sets
# the Cache-Control value per URI.

# HTTP → HTTPS (301, preserves host + path)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name myvpn.databyte.co.za databyte.co.za *.databyte.co.za _;

    # ACME http-01 challenge passthrough (none today; placeholder for future)
    location /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Cloudflare Origin Cert, no public trust
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name myvpn.databyte.co.za databyte.co.za *.databyte.co.za _;

    # v1.5.0: Let's Encrypt (was Cloudflare Origin Cert — Windows doesn't trust it)
    ssl_certificate     /etc/letsencrypt/live/myvpn.databyte.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myvpn.databyte.co.za/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # === 7 security headers (server level, applied to ALL responses) ===
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://static.cloudflareinsights.com; style-src 'self'; img-src 'self' data: https://static.cloudflareinsights.com; font-src 'self'; connect-src 'self' https://static.cloudflareinsights.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests; report-uri /api/csp-report" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # === Cache-Control via map (server level) ===
    # Default: no-cache (HTML pages, API JSON)
    # /static/* → 7-day immutable
    # /certs/* → 24h
    add_header Cache-Control $cache_control always;
    add_header Pragma "no-cache" always;
    add_header Expires "0" always;

    # Logs — JSON-friendly format declared in /etc/nginx/conf.d/portal-limits.conf
    access_log /var/log/nginx/vpn-portal.access.log portal_json;
    error_log  /var/log/nginx/vpn-portal.error.log warn;

    # Body size cap — portal JSON only, large bodies = attack
    client_max_body_size 1m;
    client_body_timeout 30s;
    client_header_timeout 30s;

    # Connection limit
    limit_conn portal_conn 20;

    # ---- Static assets: serve from disk, no add_header (inherits server level) ----
    # The $cache_control map returns "public, max-age=604800, immutable" for
    # /static/* so the right Cache-Control is set. Security headers come from
    # the server level. This is the key fix from CP6: previously we had
    # add_header Cache-Control in the /static/ child block, which reset the
    # parent's security headers per nginx headers_module docs.
    location /static/ {
        alias /opt/vpn-portal/www/static/;
        access_log off;
        try_files $uri =404;
    }

    # ---- Client cert distribution (CP5) ----
    # Public URL: https://myvpn.databyte.co.za/certs/strongswan-ca.crt.pem
    # Mirrors /opt/strongswan-vpn-gateway/docker/swanctl/x509ca/strongswan-ca.crt.pem
    # (strongswan container bind-mounts the same host path)
    #
    # Blocklist .srl + .gitkeep + hidden files (regex location, takes precedence
    # over /certs/ below). They were previously exposed (200 OK, 41 bytes + empty).
    # Per nginx location matching, regex locations are tried after prefix locations
    # of the same type, but with a `^~` modifier OR a more specific regex wins.
    # We use a standalone regex location (no other directive inside) — it returns
    # 404 BEFORE the /certs/ block is consulted.
    location ~* ^/certs/.+\.(srl|gitkeep|swp|bak)$ {
        return 404;
    }
    location ~* ^/certs/\.(gitkeep|htaccess|env|git|svn|DS_Store)$ {
        return 404;
    }
    location /certs/ {
        alias /opt/strongswan-vpn-gateway/docker/swanctl/x509ca/;
        access_log off;
        autoindex off;
        try_files $uri =404;
    }

    # ---- Health probes: no auth, no log ----
    location = /api/health {
        access_log off;
        proxy_pass http://unix:/run/vpn-portal/gunicorn.sock;
        include /etc/nginx/proxy_params;
    }

    # ---- Login endpoints: stricter rate limit (5 req/min) ----
    location ~ ^/(api/login|api/portal/login) {
        limit_req zone=portal_login burst=3 nodelay;
        proxy_pass http://unix:/run/vpn-portal/gunicorn.sock;
        include /etc/nginx/proxy_params;
    }

    # ---- CSP report endpoint: unauthenticated, low rate (10/min) ----
    location = /api/csp-report {
        limit_req zone=portal_csp burst=5 nodelay;
        proxy_pass http://unix:/run/vpn-portal/gunicorn.sock;
        include /etc/nginx/proxy_params;
    }

    # ---- Everything else: standard API rate limit ----
    # HTML pages (/, /portal/) get no-cache via the server-level $cache_control map.
    # API JSON gets no-cache (sensitive, never cache).
    location / {
        limit_req zone=portal_api burst=20 nodelay;
        proxy_pass http://unix:/run/vpn-portal/gunicorn.sock;
        include /etc/nginx/proxy_params;
    }
}
