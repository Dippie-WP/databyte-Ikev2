# /etc/nginx/sites-available/vpn-portal
# databyte VPN Portal — Cloudflare Origin Cert + Unix socket proxy
# CP4 (HTTPS + security headers) + CP5 (/certs/ static hosting)

# Rate limit + conn limit zones (loaded once at http {} scope from conf.d/portal-limits.conf)
# limit_req_zone / limit_conn_zone directives live in /etc/nginx/conf.d/portal-limits.conf

# HTTP → HTTPS (301, preserves host + path)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name myvpn.databyte.co.za databyte.co.za *.databyte.co.za _;

    # ACME http-01 challenge passthrough (none today; placeholder for future)
    location /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Cloudflare Origin Cert, no public trust
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name myvpn.databyte.co.za databyte.co.za *.databyte.co.za _;

    ssl_certificate     /etc/ssl/cloudflare/databyte.co.za.crt;
    ssl_certificate_key /etc/ssl/cloudflare/databyte.co.za.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS — 2 years, includeSubDomains, preload-eligible
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # Logs — JSON-friendly format declared in /etc/nginx/conf.d/portal-limits.conf
    access_log /var/log/nginx/vpn-portal.access.log portal;
    error_log  /var/log/nginx/vpn-portal.error.log warn;

    # Body size cap — portal JSON only, large bodies = attack
    client_max_body_size 1m;
    client_body_timeout 30s;
    client_header_timeout 30s;

    # Connection limit
    limit_conn portal_conn 20;

    # ---- Static assets: long cache + immutable ----
    location /static/ {
        alias /opt/vpn-portal/www/static/;
        access_log off;
        add_header Cache-Control "public, max-age=604800, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ---- Client cert distribution (CP5) ----
    # Public URL: https://myvpn.databyte.co.za/certs/strongswan-ca.crt.pem
    # Mirrors /opt/strongswan-vpn-gateway/docker/swanctl/x509ca/strongswan-ca.crt.pem
    # (strongswan container bind-mounts the same host path)
    location /certs/ {
        alias /opt/strongswan-vpn-gateway/docker/swanctl/x509ca/;
        access_log off;
        autoindex off;
        add_header Cache-Control "public, max-age=86400" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ---- Health probes: no auth, no log (no limit_req inherits since not set at server level) ----
    location = /api/health {
        access_log off;
        proxy_pass http://unix:/run/vpn-portal/gunicorn.sock;
        include /etc/nginx/proxy_params;
    }

    # ---- Login endpoints: stricter rate limit (5 req/min) ----
    location ~ ^/(api/login|api/portal/login) {
        limit_req zone=portal_login burst=3 nodelay;
        proxy_pass http://unix:/run/vpn-portal/gunicorn.sock;
        include /etc/nginx/proxy_params;
    }

    # ---- Everything else: standard API rate limit ----
    location / {
        limit_req zone=portal_api burst=20 nodelay;
        proxy_pass http://unix:/run/vpn-portal/gunicorn.sock;
        include /etc/nginx/proxy_params;
    }
}
