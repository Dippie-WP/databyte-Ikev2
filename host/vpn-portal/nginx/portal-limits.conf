# /etc/nginx/conf.d/portal-limits.conf
# HTTP-scope directives for VPN portal — loaded by main nginx.conf

# Rate limits
limit_req_zone $binary_remote_addr zone=portal_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=portal_api:10m rate=60r/m;
limit_conn_zone $binary_remote_addr zone=portal_conn:10m;

# JSON-friendly log format (parseable by Promtail/Vector/Loki later)
log_format portal '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time uct="$upstream_connect_time" '
                  'urt="$upstream_response_time"';

# Map: which URIs get no-cache headers (HTML pages)
# Browser cache for /static/* and /certs/* is handled by their own location blocks.
# API JSON responses are auth-sensitive and shouldn't be cached either, but they
# typically aren't cached by browsers (vary: Authorization / no-store by convention).
# The HTML pages (/, /portal/) MUST not be cached, otherwise users see stale
# `?v=1.4.x` references and miss new deploys.
map $uri $html_no_cache {
    default                     0;
    "/"                         1;
    "/portal/"                  1;
    "/portal"                   1;
    "/index.html"               1;
}
