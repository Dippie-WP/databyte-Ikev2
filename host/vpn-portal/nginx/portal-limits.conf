# /etc/nginx/conf.d/portal-limits.conf
# HTTP-scope directives for VPN portal — loaded by main nginx.conf

# Rate limits
limit_req_zone $binary_remote_addr zone=portal_login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=portal_api:10m rate=60r/m;
limit_conn_zone $binary_remote_addr zone=portal_conn:10m;

# JSON-friendly log format (parseable by Promtail/Vector/Loki later)
log_format portal_json escape=json '{'
                                '"ts":"$time_iso8601",'
                                '"remote_addr":"$remote_addr",'
                                '"method":"$request_method",'
                                '"path":"$request_uri",'
                                '"status":$status,'
                                '"bytes_sent":$body_bytes_sent,'
                                '"req_time":$request_time,'
                                '"ua":"$http_user_agent",'
                                '"referer":"$http_referer",'
                                '"xff":"$http_x_forwarded_for",'
                                '"upstream_status":"$upstream_status",'
                                '"upstream_time":"$upstream_response_time",'
                                '"upstream_addr":"$upstream_addr"'
                                '}';

# Plain-text fallback (commented; uncomment for human reading)
#log_format portal '$remote_addr - $remote_user [$time_local] '
#                  '"$request" $status $body_bytes_sent '
#                  '"$http_referer" "$http_user_agent" '
#                  'rt=$request_time uct="$upstream_connect_time" '
#                  'urt="$upstream_response_time"';

# CP6 — no-cache policy for HTML pages via map.
# All add_header directives live at server level (vpn-portal.conf). Child
# location blocks (/static/, /certs/) override Cache-Control as needed.
# Per nginx headers_module docs: a child block with add_header RESETS the
# parent's add_headers, so we keep all add_header at server level.
map $uri $cache_control {
    default                         "no-cache, no-store, must-revalidate";
    "/"                             "no-cache, no-store, must-revalidate";
    "/portal/"                      "no-cache, no-store, must-revalidate";
    "/portal"                       "no-cache, no-store, must-revalidate";
    "/index.html"                   "no-cache, no-store, must-revalidate";
    "~^/static/.*"                  "public, max-age=604800, immutable";
    "~^/certs/.*"                   "public, max-age=86400";
}
