name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch on new push
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build image + smoke test
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker build \
            --tag strongswan:ci \
            --file docker/Dockerfile \
            docker/

      - name: Verify charon version
        run: |
          # charon lives at /usr/libexec/ipsec/charon, not in PATH
          VERSION=$(docker run --rm --entrypoint /usr/libexec/ipsec/charon strongswan:ci --version)
          echo "charon reports: $VERSION"
          if ! echo "$VERSION" | grep -q "strongSwan 6.0.7"; then
            echo "::error::charon version mismatch (expected strongSwan 6.0.7)"
            exit 1
          fi

      - name: Verify required plugins present
        run: |
          docker run --rm --entrypoint bash strongswan:ci -c '
            set -eu
            plugins_dir=/usr/lib/ipsec/plugins
            required=(attr-sql sqlite eap-mschapv2 eap-radius eap-tls eap-identity kernel-netlink vici)
            missing=()
            for p in "${required[@]}"; do
              if [ ! -f "$plugins_dir/libstrongswan-$p.so" ]; then
                missing+=("$p")
              fi
            done
            if [ "${#missing[@]}" -ne 0 ]; then
              echo "::error::Missing plugins: ${missing[*]}"
              exit 1
            fi
            echo "All required plugins present: ${required[*]}"
          '

      - name: Verify baked strongswan.conf
        run: |
          # The image bakes /etc/strongswan.conf with the start-scripts block.
          # Smoke check: the file must exist and reference the TCP VICI socket.
          docker run --rm --entrypoint bash strongswan:ci -c '
            set -eu
            if [ ! -f /etc/strongswan.conf ]; then
              echo "::error::Missing /etc/strongswan.conf"
              exit 1
            fi
            if ! grep -q "tcp://127.0.0.1:4502" /etc/strongswan.conf; then
              echo "::error::strongswan.conf does not reference TCP VICI socket"
              exit 1
            fi
            if ! grep -q "start-scripts" /etc/strongswan.conf; then
              echo "::error::strongswan.conf missing start-scripts block"
              exit 1
            fi
            echo "strongswan.conf: VICI socket + start-scripts block present"
          '

      - name: Verify /start.sh entrypoint is executable
        run: |
          docker run --rm --entrypoint stat strongswan:ci /start.sh
          # stat exits 0 if file exists, regardless of perms; check perms explicitly
          docker run --rm --entrypoint bash strongswan:ci -c '
            if [ ! -x /start.sh ]; then
              echo "::error::/start.sh is not executable"
              exit 1
            fi
            echo "/start.sh executable: OK"
          '

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile
          config: .hadolint.yaml
          failure-threshold: error

  # ---------- Layer 0.5: Lab-leakage guard ----------
  # Catches production code paths that reference the LXC 903 lab
  # (192.168.10.98 / vpn.homelab.local / 102.182.117.43 / "LXC 903").
  # Per TODO.md Bug #5: lab and prod are intentionally separate. If you
  # find yourself committing a lab IP into host/ or docker/, this will
  # fail and you'll fix it before merge.
  # Added: 2026-07-01 (audit follow-up — check_stale_refs.sh existed in
  # scripts/ but was NOT wired into CI; rot went undetected).
  lab-leakage-guard:
    name: Lab-leakage guard (check_stale_refs.sh)
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Run check_stale_refs.py --strict (Python tokenize-aware)
        run: python3 scripts/check_stale_refs.py --strict

  # ---------- Layer 1: Portal API integration tests (pytest) ----------
  # Catch portal regressions (e.g. Lesson #193: lookup_user_and_customer SQL bug
  # existed for 3 days before being caught). Runs offline against a tmp SQLite
  # DB with mocked ssh_903 — no live VPN gateway needed.
  # Added: 2026-06-24 (vpn-portal v1.4.x)
  portal-tests:
    name: Portal API integration tests (pytest)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-pytest-${{ hashFiles('host/vpn-portal/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-pytest-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r host/vpn-portal/requirements.txt

      - name: Run portal API tests
        run: |
          cd ${{ github.workspace }}
          echo "=== STEP START ==="
          python -V
          python -c 'import sys, os; print("PYTHONPATH:", sys.path); print("CWD:", os.getcwd())'
          python -m pytest --version
          echo "=== pinned pkgs ==="
          pip list 2>/dev/null | grep -iE "^(fastapi|sqlalchemy|pymysql|pytest|httpx|pydantic|argon2-cffi|gunicorn|uvicorn)\b" || echo "(none found)"
          echo "=== try import app to see if it crashes early ==="
          python -c "import sys; sys.path.insert(0, 'host/vpn-portal'); import app; print('app imported OK, VPN_HOST=', app.VPN_HOST)"
          echo "=== conftest import test ==="
          python -c "import sys; sys.path.insert(0, 'tests'); import conftest; print('conftest imported OK')"
          echo "=== NOW: actual pytest run with verbose ==="
          set +e
          python -m pytest tests/ -v --tb=long --color=no -p no:cacheprovider 2>&1
          rc=$?
          set -e
          echo "=== EXIT $rc ==="
          exit $rc

  # ---------- Layer 2: DB integrity check ----------
  # Catch silent DB drift that production users would hit but L1 pytest
  # can't simulate (live VPS DB only). The script gracefully skips checks
  # for tables that don't exist in fixtures.
  # Added: 2026-06-25
  db-integrity:
    name: DB integrity check (Layer 2)
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install sqlite3
        run: sudo apt-get install -y sqlite3

      - name: Build test DB from fixtures
        run: |
          TEST_DB=/tmp/test_integrity.db
          rm -f "$TEST_DB"
          sqlite3 "$TEST_DB" < tests/fixtures/strongswan-schema.sql
          sqlite3 "$TEST_DB" < tests/fixtures/quota-schema.sql
          sqlite3 "$TEST_DB" < tests/fixtures/portal-schema.sql
          sqlite3 "$TEST_DB" < tests/fixtures/portal-customers-extensions.sql
          sqlite3 "$TEST_DB" < tests/fixtures/portal-user-id-fk.sql
          sqlite3 "$TEST_DB" < tests/fixtures/test-users-extension.sql

      - name: Seed minimal valid state
        run: |
          TEST_DB=/tmp/test_integrity.db
          sqlite3 "$TEST_DB" <<'SQL'
          -- One tier
          INSERT INTO tiers (id, name, display_name, data_limit_bytes, created_at)
            VALUES (1, 'test_tier', 'Test', 1000000, 1700000000);
          -- Three users:
          --   id=1 user-with-device     — used by customer-with-device
          --   id=2 orphan-user           — no customer (should be flagged)
          --   id=3 no-devices-user       — only added in cleanup step
          INSERT INTO users (id, name, password) VALUES
            (1, 'user-with-device', X'deadbeef'),
            (2, 'orphan-user',       X'deadbeef');
          -- Two customers (one with device, one without — no-devices-customer flagged).
          -- Bug #2: customer-with-device has user_id set to the device's user.
          -- no-devices-customer has user_id NULL (no devices → no user to FK to).
          INSERT INTO customers (id, name, display_name, is_operator, is_active,
                                data_limit_bytes, data_used_bytes, status,
                                created_at, updated_at,
                                bandwidth_down_mbps, bandwidth_up_mbps, user_id)
            VALUES (1, 'customer-with-device', 'Has Device', 0, 1, 1000000, 0, 'active', 1700000000, 1700000000, 20, 20, 1),
                   (2, 'no-devices-customer',  'No Devices',  0, 1, 1000000, 0, 'active', 1700000000, 1700000000, 20, 20, NULL);
          -- One device (only for customer-with-device, with matching user)
          INSERT INTO devices (id, customer_id, strongswan_user_id, device_name,
                              is_active, created_at, updated_at)
            VALUES (1, 1, 1, 'user-with-device', 1, 1700000000, 1700000000);
          -- installer_tokens table is NOT created here on purpose — exercises the
          -- graceful-skip path. (Created at runtime by installer_tokens.py in app.py.)
          SQL

      - name: Run DB integrity check
        run: |
          # set +e: GitHub Actions uses `set -e` by default, which would
          # kill the script the moment python exits 1 (drift detected)
          # and prevent the harness check from running. We need to
          # capture the exit code BEFORE bash can react to it.
          set +e
          python3 scripts/check_db_integrity.py --db /tmp/test_integrity.db
          rc=$?
          set -e
          # Should FAIL on purpose: orphan-user + no-devices-customer.
          # Test harness must catch this failure to prove the script detects drift.
          if [ "$rc" -ne 1 ]; then
            echo "::error::Integrity check should have failed on seeded drift (exit 1 expected, got $rc)"
            exit 1
          fi
          echo "Integrity check correctly detected seeded drift."

      - name: Verify passing state after cleanup
        run: |
          TEST_DB=/tmp/test_integrity.db
          # Fix ALL the seeded drift:
          #   - orphan-user (id=2) → give it a customer + device
          #   - no-devices-customer (id=2) → give it a NEW user + device
          # Bug #2: each customer gets a user_id so the user-id-fk check passes.
          sqlite3 "$TEST_DB" <<'SQL'
          -- 1. Give orphan-user a customer + device
          INSERT INTO customers (id, name, display_name, is_operator, is_active,
                                data_limit_bytes, data_used_bytes, status,
                                created_at, updated_at,
                                bandwidth_down_mbps, bandwidth_up_mbps, user_id)
            VALUES (3, 'orphan-user-customer', 'For Orphan', 0, 1, 1000000, 0, 'active', 1700000000, 1700000000, 20, 20, 2);
          INSERT INTO devices (id, customer_id, strongswan_user_id, device_name,
                              is_active, created_at, updated_at)
            VALUES (2, 3, 2, 'orphan-user', 1, 1700000000, 1700000000);

          -- 2. Give no-devices-customer (id=2) a NEW user (id=3) + device
          --    devices.strongswan_user_id is UNIQUE, so we can't reuse user 1.
          INSERT INTO users (id, name, password) VALUES (3, 'no-devices-user', X'deadbeef');
          UPDATE customers SET user_id = 3 WHERE id = 2;
          INSERT INTO devices (id, customer_id, strongswan_user_id, device_name,
                              is_active, created_at, updated_at)
            VALUES (3, 2, 3, 'no-devices-laptop', 1, 1700000000, 1700000000);
          SQL

          set +e
          python3 scripts/check_db_integrity.py --db "$TEST_DB"
          rc=$?
          set -e
          if [ "$rc" -ne 0 ]; then
            echo "::error::Integrity check should pass after drift fix (exit 0 expected, got $rc)"
            exit 1
          fi
          echo "Integrity check correctly passes after drift fix."
