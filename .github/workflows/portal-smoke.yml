# v1.2.10 — databyte VPN portal headless-browser smoke test
#
# Runs tools/portal-smoke.js against a live portal instance. Catches the
# v1.2.7.1 class of bug (API works, UI renders empty DOM) by driving a
# real Chromium against the portal and verifying 8 DOM-layer invariants.
#
# Triggers:
#   - On every push to main, v1.2.7.x, v1.2.8, v1.2.9, v1.2.10, master
#   - On every PR against main
#   - Manual workflow_dispatch
#
# Required secrets (only when staging portal is wired up):
#   - PORTAL_URL: staging portal URL, e.g. http://staging.vpn.homelab.local:8080
#   - PORTAL_ADMIN_USER: admin username
#   - PORTAL_ADMIN_PASS: admin password
#
# If secrets are not set, the workflow skips with a clear warning and
# exits 0 (no failed-run emails).
#
# Optional:
#   - PORTAL_SMOKE_TIMEOUT_MS: per-check timeout override (default 20000)

name: portal-smoke

on:
  push:
    branches: [main, v1.2.7.*, v1.2.8, v1.2.9, v1.2.10, v1.3.*, master]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      portal_url:
        description: 'Portal URL to smoke against (overrides secret)'
        required: false
        type: string
      extra_args:
        description: 'Extra args to portal-smoke.js (e.g. --no-screenshots)'
        required: false
        type: string
        default: ''

# Cancel in-progress runs for the same branch on new push
concurrency:
  group: portal-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: portal smoke (Chromium DOM-layer checks)
    # v1.2.11 — self-hosted runner on LXC 903 (VPN gateway LXC).
    # Per Zun's rule (2026-06-21): CI tooling belongs on the VPN LXC,
    # not 902 (monitoring) or a separate LXC.
    # Labels: [self-hosted, Linux, X64, lxc-903, vpn]
    runs-on: [self-hosted, lxc-903, vpn]
    timeout-minutes: 5

    env:
      PORTAL_URL: ${{ secrets.PORTAL_URL }}
      PORTAL_ADMIN_USER: ${{ secrets.PORTAL_ADMIN_USER }}
      PORTAL_ADMIN_PASS: ${{ secrets.PORTAL_ADMIN_PASS }}

    steps:
      - name: Skip if PORTAL_URL secret not configured
        id: check
        run: |
          if [ -z "${PORTAL_URL:-}" ]; then
            echo "::warning::PORTAL_URL secret is not set. Skipping portal smoke."
            echo "Set PORTAL_URL, PORTAL_ADMIN_USER, PORTAL_ADMIN_PASS in repo settings to enable."
            echo "See docs/CI.md for instructions."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "PORTAL_URL set: $PORTAL_URL"
          fi

      - name: Checkout
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Set up Node.js
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # v1.2.10 fix: switched from `apt-get install chromium chromium-driver ...`
      # (which failed on ubuntu-latest because Ubuntu 24.04 ships a snap stub
      # for `chromium` that pulls nothing) to using the full `puppeteer`
      # package, which downloads its own pinned Chromium into a cached
      # ~/.cache/puppeteer directory. ~280MB first run, cached thereafter.
      - name: Install puppeteer (downloads Chromium)
        if: steps.check.outputs.skip != 'true'
        working-directory: tools
        run: |
          # Use full puppeteer (not puppeteer-core) so it bundles Chromium.
          # For local dev, the smoke test still works with puppeteer-core + system
          # /usr/bin/chromium (no download). CI uses full puppeteer for reliability.
          npm install --no-audit --no-fund
          npx puppeteer browsers install chrome
          echo "Chromium path: $(node -e 'console.log(require("puppeteer").executablePath())')"

      - name: Patch config with secrets
        if: steps.check.outputs.skip != 'true'
        working-directory: tools
        run: |
          # portal-smoke.config.json has placeholders. Patch in secrets.
          # Use a Node one-liner so we don't need jq.
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('portal-smoke.config.json', 'utf8'));
            cfg.base_url = process.env.PORTAL_URL;
            cfg.username = process.env.PORTAL_ADMIN_USER;
            cfg.password = process.env.PORTAL_ADMIN_PASS;
            if (process.env.PORTAL_SMOKE_TIMEOUT_MS) {
              cfg.timeouts.selector_ms = parseInt(process.env.PORTAL_SMOKE_TIMEOUT_MS, 10);
            }
            fs.writeFileSync('portal-smoke.config.json', JSON.stringify(cfg, null, 2) + '\n');
          "
          # Sanity check (don't leak the password into the log)
          node -e "
            const cfg = require('./portal-smoke.config.json');
            if (!cfg.base_url) { console.error('missing base_url'); process.exit(1); }
            if (!cfg.username) { console.error('missing username'); process.exit(1); }
            if (!cfg.password) { console.error('missing password'); process.exit(1); }
            console.log('config: base_url=' + cfg.base_url + ' user=' + cfg.username);
          "

      - name: Run portal smoke
        if: steps.check.outputs.skip != 'true'
        working-directory: tools
        env:
          PORTAL_URL: ${{ env.PORTAL_URL }}
        run: |
          EXTRA="${{ github.event.inputs.extra_args }}"
          if [ -n "$EXTRA" ]; then
            node portal-smoke.js $EXTRA
          else
            node portal-smoke.js
          fi

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: portal-smoke-screenshots
          path: tools/screenshots/
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload screenshots on success
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: portal-smoke-screenshots-success
          path: tools/screenshots/
          if-no-files-found: ignore
          retention-days: 3

      - name: Clean up Chromium cache (save runner disk)
        if: always()
        run: |
          # Don't store 280MB Chromium cache on the runner after the run
          rm -rf ~/.cache/puppeteer 2>/dev/null || true

      - name: Report runner
        if: always()
        run: |
          echo "Runner: $(hostname) ($(uname -a))"
          echo "Portal URL: ${PORTAL_URL}"
          echo "Date: $(date -u)"
