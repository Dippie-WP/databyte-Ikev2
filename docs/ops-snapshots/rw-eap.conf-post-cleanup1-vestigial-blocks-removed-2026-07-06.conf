# rw-eap.conf — IKEv2 + EAP-MSCHAPv2 (LE cert, prod)
#
# Production config (vpn-prod-01 / Xneelo / 154.65.110.44)
# Migrated 2026-06-25 from LXC 903 lab config:
#   - certs = server.pem          (was server.crt.pem — alias for LE cert)
#   - cacerts REMOVED             (LE chains via public trust; no client CA install)
#   - id = "myvpn.databyte.co.za" (was vpn.homelab.local — LXC 903 hostname)
#   - proposals add -ecp256       (iOS 18+ defaults to ECP_256 KE; without
#                                  it iOS gets N(INVAL_KE) and silently gives up)
#
# Coexists with rw-psk (no port conflict; auth-type dispatch).
# Secrets block preserved from prior live config (35 EAP customers).

connections {
  rw-eap {
    version = 2
    send_cert = always
    local_addrs  = 0.0.0.0
    remote_addrs = %any
    pools        = rw-pool
    proposals    = aes256-sha256-modp2048-ecp256,aes128-sha256-modp2048-ecp256
    unique       = replace
    rekey_time   = 24h
    # v1.8.0 — reauth_time 24h → 1h. The pool lease is sticky for
    # reauth_time after the IKE_SA dies (DPD timeout, iOS sleep, etc.).
    # A 24h retention meant stale leases accumulated: the operator panel
    # showed 'Active session' for days after the customer's phone had
    # stopped using the tunnel. 1h is short enough that stale state
    # clears within a working day, long enough that a brief reconnect
    # after a battery-saving sleep doesn't drop the assigned VIP.
    reauth_time  = 1h
    mobike       = yes
    fragmentation = yes
    dpd_delay    = 30s
    dpd_timeout  = 120s

    local {
      auth = pubkey
      certs = server.pem
      id    = "myvpn.databyte.co.za"
    }
    remote {
      auth = eap-radius
      eap_id = %any
    }

    children {
      net {
        mode = tunnel
        local_ts  = 0.0.0.0/0
        remote_ts = dynamic
        dpd_action   = clear
        start_action = start
        rekey_time   = 1h
        esp_proposals = aes256-sha256-modp2048-ecp256,aes128-sha256-modp2048-ecp256
      }
    }
  }
}
