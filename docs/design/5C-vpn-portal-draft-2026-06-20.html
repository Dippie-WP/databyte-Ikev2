const fmtGB = b => (b/1073741824).toFixed(2)+" GB";
const pct = (u,q) => q ? Math.min(100,Math.round(u/q*100)) : 0;
const barCls = p => p>=95?"bar-red":p>=80?"bar-amber":"bar-green";
const nextVip= users => { const used=users.map(u=>parseInt(u.vip.split(".").pop())); for(let i=10;i<=30;i++) if(!used.includes(i)) return 10.99.0.${i}; return ""; };function useToasts() {
 const [list,set] = useState([]);
 const add = useCallback((msg,type="ok")=>{
 const id=Date.now(); set(t=>[...t,{id,msg,type}]);
 setTimeout(()=>set(t=>t.filter(x=>x.id!==id)),3500);
 },[]);
 return [list,add];
}

function Toasts({list}){
 return <div className="toast-wrap">{list.map(t=><div key={t.id} className={`toast t-${t.type}`}>{t.msg}</div>)}</div>;
}
function CopyBtn({text}){
 const [ok,set]=useState(false);
 return <button className="copy-btn" onClick={()=>{navigator.clipboard.writeText(text);set(true);setTimeout(()=>set(false),1500)}}>{ok?"✓":"copy"}</button>;
}
function UsageBar({used,quota}){
 const p=pct(used,quota);
 return <div style={{minWidth:120}}>
 <div className="bar-wrap"><div className={`bar-fill ${barCls(p)}`} style={{width:p+"%"}}/></div>
 <div style={{fontSize:11,color:C.textSec,marginTop:3,fontFamily:C.mono}}>{fmtGB(used)} / {fmtGB(quota)} · {p}%</div>
 </div>;
}
function UsageRing({used,quota}){
 const p=pct(used,quota), r=54, circ=2*Math.PI*r;
 const stroke=p>=95?C.red:p>=80?C.amber:C.cyan;
 return <div className="ring-wrap">
 <svg width={130} height={130} style={{transform:"rotate(-90deg)"}}>
 <circle cx={65} cy={65} r={r} fill="none" stroke={C.surface2} strokeWidth={10}/>
 <circle cx={65} cy={65} r={r} fill="none" stroke={stroke} strokeWidth={10}
 strokeDasharray={circ} strokeDashoffset={circ*(1-p/100)} strokeLinecap="round"
 style={{transition:"stroke-dashoffset .6s ease"}}/>
 </svg>
 <div className="ring-label" style={{color:stroke}}>{p}%</div>
 <div className="ring-sub">{fmtGB(used)} of {fmtGB(quota)} used</div>
 </div>;
}

function Login({onLogin}){
 const [u,setU]=useState(""), [p,setP]=useState(""), [err,setErr]=useState("");
 const go=()=>{
 if(!u||!p){setErr("Enter username and password.");return;}
 if(u==="admin"&&p==="admin"){onLogin("admin",u);return;}
 const found=USERS_INIT.find(x=>x.username===u);
 if(found&&p==="pass"){onLogin("user",u);return;}
 setErr("Invalid credentials.");
 };
 return <div className="login-wrap">
 <div className="login-box">
 <div className="login-logo">databyte / vpn-portal</div>
 <div className="login-sub">Sign in to continue</div>
 {err&&<div className="login-err">{err}</div>}
 <div className="form-group" style={{marginBottom:12}}>
 <label className="form-label">Username</label>
 <input className="inp inp-mono" value={u} onChange={e=>setU(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="username" autoFocus/>
 </div>
 <div className="form-group" style={{marginBottom:20}}>
 <label className="form-label">Password</label>
 <input className="inp" type="password" value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==="Enter"&&go()} placeholder="••••••••"/>

 <div style={{marginTop:16,fontSize:11,color:C.textDim,fontFamily:C.mono,textAlign:"center"}}>demo · admin/admin · alice/pass</div>
 </div>
 </div>;
}

 </div>
 <div className="form-row">
 <div className="form-group"><label className="form-label">VPN password</label><input className="inp" type="password" value={form.vpnPass} onChange={e=>setForm(f=>({...f,vpnPass:e.target.value}))} placeholder="EAP-MSCHAPv2 secret"/></div>
 <div className="form-group"><label className="form-label">Portal password</label><input className="inp" type="password" value={form.webPass} onChange={e=>setForm(f=>({...f,webPass:e.target.value}))} placeholder="Status page login"/></div>
 </div>
 <div className="hint-box">
 After saving — add to <span style={{fontFamily:C.mono}}>swanctl.conf</span> secrets block, <span style={{fontFamily:C.mono}}>user-map.conf</span>, and <span style={{fontFamily:C.mono}}>nftables-vpn-accounting.conf</span> for {form.vip||"10.99.0.x"}. Then run <span style={{fontFamily:C.mono}}>swanctl --load-creds</span> and reload nftables.
 </div>
 <div className="modal-footer">
 <button className="btn btn-ghost" onClick={()=>setShowAdd(false)}>Cancel</button>
 <button className="btn btn-cyan" onClick={addUser}>Add user</button>
 </div>
 </div>
 </div>}

 {confirmOff&&<div className="modal-bg" onClick={()=>setConfirmOff(null)}>
 <div className="modal" onClick={e=>e.stopPropagation()}>
 <h3>Remove {confirmOff.username}?</h3>
 <p style={{fontSize:13,color:C.textSec,marginBottom:12}}>Complete all offboard steps on the server after confirming here.</p>
 <div className="hint-box" style={{marginBottom:8}}>
 <div style={{fontFamily:C.mono,marginBottom:4,fontSize:12}}>docker exec strongswan swanctl --terminate --ike {confirmOff.username}</div>
 <CopyBtn text={`docker exec strongswan swanctl --terminate --ike ${confirmOff.username}`}/>
 </div>
 <div className="hint-box">Then remove from swanctl.conf · user-map.conf · web-creds.conf · nftables-vpn-accounting.conf · quota.db</div>
 <div className="modal-footer">
 <button className="btn btn-ghost" onClick={()=>setConfirmOff(null)}>Cancel</button>
 <button className="btn btn-red" onClick={()=>offboard(confirmOff)}>Remove user</button>
 </div>
 </div>
 </div>}
 </>;
}

function AdminQuotas({users,setUsers,toast}){
 const [editId,setEditId]=useState(null);
 const [newQ,setNewQ]=useState("");const saveQ=u=>{
 const gb=parseFloat(newQ);
 if(isNaN(gb)||gb<=0){toast("Invalid value.","err");return;}
 setUsers(us=>us.map(x=>x.id===u.id?{...x,quota:gb*1073741824}:x));
 setEditId(null);
 toast(`Quota updated for ${u.username} in UI. Update user-map.conf + quota.db to persist.`,"ok");
 };
 const resetAll=()=>{
 setUsers(us=>us.map(x=>({...x,used:0})));
 toast("All quotas reset in UI. Run: sqlite3 quota.db UPDATE usage SET used_bytes=0,disconnected=0;","warn");
 };
 const resetOne=u=>{
 setUsers(us=>us.map(x=>x.id===u.id?{...x,used:0}:x));
 toast(`${u.username} quota reset. Persist: sqlite3 quota.db UPDATE usage SET used_bytes=0,disconnected=0 WHERE username='${u.username}';`,"ok");
 };
 return <>
 <div className="sec-hdr">
 <div><div className="page-title">Quotas</div><div className="page-sub">Monthly data limits</div></div>
 <button className="btn btn-amber" onClick={resetAll}>Reset all</button>
 </div>
 <div className="tbl-wrap">
 <table>
 <thead><tr><th>Username</th><th>Virtual IP</th><th>Quota</th><th>Used</th><th>Usage</th><th>State</th><th>Actions</th></tr></thead>
 <tbody>{users.map(u=>{
 const p=pct(u.used,u.quota);
 return <tr key={u.id}>
 <td className="mono">{u.username}</td>
 <td className="mono">{u.vip}</td>
 <td className="mono">{fmtGB(u.quota)}</td>
 <td className="mono">{fmtGB(u.used)}</td>
 <td style={{minWidth:160}}><UsageBar used={u.used} quota={u.quota}/></td>
 <td><span className={`badge ${p>=95?"b-red":p>=80?"b-amber":"b-green"}`}>{p>=95?"Exceeded":p>=80?"Near limit":"OK"}</span></td>
 <td><div className="btn-row">
 <button className="btn btn-ghost" onClick={()=>resetOne(u)}>Reset</button>
 {editId===u.id
 ?<><input className="inp inp-mono" value={newQ} onChange={e=>setNewQ(e.target.value)} placeholder="GB" style={{width:64}}/><button className="btn btn-green" onClick={()=>saveQ(u)}>Save</button><button className="btn btn-ghost" onClick={()=>setEditId(null)}>✕</button></>
 :<button className="btn btn-ghost" onClick={()=>{setEditId(u.id);setNewQ((u.quota/1073741824).toFixed(0));}}>Edit</button>
 }
 </div></td>
 </tr>;
 })}</tbody>
 </table>
 </div>
 <div className="card">
 <div className="card-title">Persist to server</div>
 {[
 {label:"Reset one user", cmd:"sqlite3 /var/lib/vpn-quota/quota.db \"UPDATE usage SET used_bytes=0,disconnected=0 WHERE username='USERNAME';\""},
 {label:"Reset all", cmd:"sqlite3 /var/lib/vpn-quota/quota.db \"UPDATE usage SET used_bytes=0,disconnected=0;\""},
 {label:"Edit quota", cmd:"sqlite3 /var/lib/vpn-quota/quota.db \"UPDATE usage SET quota_bytes=BYTES WHERE username='USERNAME';\""},
 {label:"View all", cmd:"sqlite3 /var/lib/vpn-quota/quota.db \"SELECT username,vip,used_bytes,quota_bytes FROM usage;\""},
 ].map(r=><div className="cmd-row" key={r.label}>
 <span className="cmd-label">{r.label}</span>
 <span className="cmd-code">{r.cmd}</span>
 <CopyBtn text={r.cmd}/>
 </div>)}
 </div>
 </>;
}

function AdminSecurity({bans,setBans,toast}){
 const [manualIp,setManualIp]=useState("");
 const [wlIp,setWlIp]=useState("");
 const [wl,setWl]=useState(WHITELIST);

 const doUnban=ip=>{
 setBans(b=>b.filter(x=>x.ip!==ip));
 setManualIp("");
 toast(`Unban queued for ${ip}. Run: sudo ipban-ctl unban ${ip}`,"ok");
 };
 const addWl=()=>{
 if(!wlIp){return;}
 setWl(w=>[...w,{cidr:wlIp,type:"Manual"}]);
 toast(`Whitelist add queued for ${wlIp}. Run: sudo ipban-ctl whitelist add ${wlIp}`,"ok");
 setWlIp("");
 };

 return <>
 <div className="page-title">Security</div>
 <div className="page-sub">ipBan · LXC 902 · firewalld</div>
 <div className="grid-2">
 <div className="card"><div className="card-title">Active bans — {bans.length}</div>
 {bans.length===0&&<div style={{color:C.textSec,fontSize:13}}>No active bans.</div>}
 {bans.map(b=><div className="row" key={b.ip}>
 <span className="mono" style={{flex:1,fontSize:11}}>{b.ip}</span>
 <span className={`badge ${b.source==="sshd"?"b-cyan":b.source==="strongSwan"?"b-amber":"b-red"}`} style={{marginRight:6}}>{b.source}</span>
 <span style={{fontSize:11,color:C.textSec,marginRight:8}}>{b.count}×</span>
 <button className="btn btn-red" style={{padding:"3px 8px",fontSize:11}} onClick={()=>doUnban(b.ip)}>Unban</button>
 </div>)}
 <div className="divider"/>
 <div style={{fontSize:12,color:C.textSec,marginBottom:8}}>Manual unban</div>
 <div className="form-row" style={{marginBottom:0}}>
 <input className="inp inp-mono" value={manualIp} onChange={e=>setManualIp(e.target.value)} placeholder="x.x.x.x" style={{flex:1}}/>
 <button className="btn btn-amber" onClick={()=>manualIp&&doUnban(manualIp)}>Unban</button>
 </div>
 </div>
 <div className="card">
 <div className="card-title">Whitelist — {wl.length} entries</div>
 <div style={{maxHeight:220,overflowY:"auto"}}>
 {wl.map(w=><div className="row" key={w.cidr}>
 <span className="mono" style={{flex:1,fontSize:11}}>{w.cidr}</span>
 <span style={{fontSize:11,color:C.textSec}}>{w.type}</span>
 </div>)}
 </div>
 <div className="divider"/>
 <div className="form-row" style={{marginBottom:0}}>
 <input className="inp inp-mono" value={wlIp} onChange={e=>setWlIp(e.target.value)} placeholder="IP or CIDR" style={{flex:1}}/>
 <button className="btn btn-green" onClick={addWl}>Add</button>
 </div>
 </div>
 </div>
 <div className="card" style={{marginBottom:16}}>
 <div className="card-title">Deadman switch</div>
 <p style={{fontSize:13,color:C.textSec,marginBottom:12}}>Auto-disables ipBan 24h after last arm. Lockout recovery fallback. Re-arm after each maintenance window.</p>
 <div className="btn-row" style={{marginBottom:16}}>
 {["24","48","72"].map(h=><button key={h} className="btn btn-cyan" onClick={()=>toast(`Run: sudo ipban-ctl deadman extend ${h}`,"ok")}>Extend {h}h</button>)}
 <button className="btn btn-ghost" onClick={()=>toast("Run: sudo ipban-ctl deadman status","ok")}>Check status</button>
 <button className="btn btn-red" onClick={()=>toast("Run: sudo ipban-ctl deadman disable","warn")}>Disable</button>
 </div>
 <div className="card-title">Lockout recovery</div>
 {[
 {label:"Option A — LAN", cmd:"ssh zunaid@192.168.10.212 sudo ipban-ctl unban YOUR_IP"},
 {label:"Option B — OC host",cmd:"/usr/local/bin/ipban unban YOUR_IP"},
 {label:"Option C — pve2", cmd:"pct exec 902 -- /usr/local/bin/ipban-ctl unban YOUR_IP"},
 {label:"Bounce LXC 902", cmd:"ssh root@192.168.10.210 'pct shutdown 902 --forceStop 1 --timeout 30 && pct start 902'"},
 ].map(r=><div className="cmd-row" key={r.label}>
 <span className="cmd-label">{r.label}</span>
 <span className="cmd-code">{r.cmd}</span>
 <CopyBtn text={r.cmd}/>
 </div>)}
 </div>
 </>;
}

function UserPortal({username}){
 const u=USERS_INIT.find(x=>x.username===username)||USERS_INIT[0];
 const p=pct(u.used,u.quota);
 const remaining=u.quota-u.used;
 return <>
 <div className="page-title">My VPN</div>
 <div className="page-sub">databyte · {u.username}</div>
 <div className="grid-3">
 <div className="card" style={{display:"flex",flexDirection:column,alignItems:"center"}}>
 <UsageRing used={u.used} quota={u.quota}/>
 </div>
 <div className="card">
 <div className="card-title">Session</div>
 {[
 {label:"Status", val:<span className={`badge ${u.connected?"b-green":"b-dim"}`}><span className={`dot ${u.connected?"dot-green":"dot-dim"}`}/>{u.connected?"Connected":"Offline"}</span>},
 {label:"Virtual IP", val:<span className="mono" style={{fontSize:12}}>{u.vip}</span>},
 {label:"Last connected",val:<span style={{fontSize:12,color:C.textSec}}>{u.last}</span>},
 {label:"Client", val:<span style={{fontSize:12,color:C.textSec}}>{u.source}</span>},
 ].map(r=><div className="row" key={r.label}>
 <span style={{color:C.textSec,fontSize:13,flex:1}}>{r.label}</span>{r.val}
 </div>)}
 </div>
 <div className="card">
 <div className="card-title">Usage breakdown</div>
 {[
 {label:"Used this period", val:fmtGB(u.used), color:C.textPri},
 {label:"Remaining", val:fmtGB(remaining), color:remaining<1073741824?C.red:C.textPri},
 {label:"Total quota", val:fmtGB(u.quota), color:C.textPri},
 {label:"Quota resets", val:"1st of month", color:C.textSec},
 ].map(r=><div className="row" key={r.label}>
 <span style={{color:C.textSec,fontSize:13,flex:1}}>{r.label}</span>
 <span className="mono" style={{fontSize:12,color:r.color}}>{r.val}</span>
 </div>)}
 {p>=95&&<div style={{marginTop:12,padding:"10px 12px",background:C.redDim,border:`1px solid ${C.red}33`,borderRadius:6,fontSize:12,color:C.red}}>Quota exceeded — contact your administrator to restore access.</div>}
 {p>=80&&p<95&&<div style={{marginTop:12,padding:"10px 12px",background:C.amberDim,border:`1px solid ${C.amber}33`,borderRadius:6,fontSize:12,color:C.amber}}>You have used {p}% of your quota this period.</div>}
 </div>
 </div>
 <div className="card">
 <div className="card-title">Connection guide</div>
 <div className="grid-2">
 {[
 {platform:"Windows",steps:["Settings → Network & Internet → VPN","Add VPN connection → IKEv2",`Server: vpn.databyte.co.za`,`Username: ${u.username}`,"VPN type: IKEv2 · Auth: Username & password"]},
 {platform:"Android",steps:["Install strongSwan VPN Client (Play Store / F-Droid)","Add profile → IKEv2 EAP (Username/Password)",`Server: vpn.databyte.co.za`,`Username: ${u.username}`,"CA certificate: Select automatically"]},
 {platform:"iOS", steps:["Settings → General → VPN & Device Management → VPN","Add VPN Configuration → Type: IKEv2",`Server: vpn.databyte.co.za`,`Remote ID: vpn.databyte.co.za`,`Username: ${u.username}`]},
 {platform:"macOS", steps:["System Settings → VPN → Add VPN Configuration → IKEv2",`Server: vpn.databyte.co.za`,`Remote ID: vpn.databyte.co.za`,`Username: ${u.username}`,"User Authentication: Username and Password"]},
 ].map(g=><div key={g.platform} style={{background:C.surface2,borderRadius:8,padding:"12px 14px"}}>
 <div style={{fontSize:12,fontWeight:600,color:C.cyan,marginBottom:8}}>{g.platform}</div>
 {g.steps.map((s,i)=><div key={i} style={{fontSize:12,color:C.textSec,marginBottom:4,display:"flex",gap:8}}>
 <span style={{color:C.textDim,minWidth:16}}>{i+1}.</span><span>{s}</span>
 </div>)}
 </div>)}
 </div>
 </div>
 </>;
}

function App(){
 const [auth,setAuth]=useState(null);
 const [tab,setTab]=useState("overview");
 const [users,setUsers]=useState(USERS_INIT);
 const [bans,setBans]=useState(BANS_INIT);
 const [toasts,addToast]=useToasts();

 if(!auth) return <>
 <style>{G()}</style>
 <Login onLogin={(role,u)=>setAuth({role,username:u})}/>
 <Toasts list={toasts}/>
 </>;

 const isAdmin=auth.role==="admin";
 const TABS=[{id:"overview",label:"Overview"},{id:"users",label:"Users"},{id:"quotas",label:"Quotas"},{id:"security",label:"Security"}];

 return <>
 <style>{G()}</style>
 <div className="app">
 <nav className="nav">
 <span className="nav-logo">databyte</span>
 <span className="nav-sep"/>
 {isAdmin?TABS.map(t=><button key={t.id} className={`nav-tab ${tab===t.id?"active":""}`} onClick={()=>setTab(t.id)}>{t.label}</button>)
 :<button className="nav-tab active">My VPN</button>}
 <div className="nav-right">
 <span className="nav-user">{auth.username}</span>
 <span className={`nav-badge ${isAdmin?"badge-admin":"badge-user"}`}>{isAdmin?"admin":"user"}</span>
 <button className="btn btn-ghost" onClick={()=>{setAuth(null);setTab("overview");}}>Sign out</button>
 </div>
 </nav>
 <main className="main">
 {isAdmin&&tab==="overview" &&<AdminOverview users={users} bans={bans} toast={addToast}/>}
 {isAdmin&&tab==="users" &&<AdminUsers users={users} setUsers={setUsers} toast={addToast}/>}
 {isAdmin&&tab==="quotas" &&<AdminQuotas users={users} setUsers={setUsers} toast={addToast}/>}
 {isAdmin&&tab==="security" &&<AdminSecurity bans={setBans} toast={addToast}/>}
 {!isAdmin&&<UserPortal username={auth.username}/>}
 </main>
 </div>
 <Toasts list={toasts}/>
 </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
