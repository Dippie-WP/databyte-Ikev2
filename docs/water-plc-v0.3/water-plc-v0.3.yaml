# Water PLC ESPHome YAML — v0.3
# Target: ESP32-C6 DevKitC-1 (N16R8)
# Site: 1970 Cape Town house, domestic water replenishment controller
# Author: Misha for Zun, 2026-07-18

esphome:
  name: water-plc-001
  friendly_name: Water Replenishment Controller
  platformio_options:
    board: esp32-c6-devkitc-1
    framework:
      platform_version: 6.5.0

esp32:
  variant: esp32c6
  flash_size: 8MB
  framework:
    type: arduino

# ─── Network / API / OTA ─────────────────────────────────────────────
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Water-PLC-001-AP"
    password: !secret ap_password

captive_portal:

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

time:
  - platform: sntp
    id: sntp_time
    timezone: Africa/Johannesburg
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
      - 2.pool.ntp.org
  - platform: ds1307
    id: rtc_ds3231
    i2c_id: bus_i2c
    address: 0x68
    update_interval: 60s

# ─── I²C bus (OLED + RTC) ───────────────────────────────────────────
i2c:
  - id: bus_i2c
    sda: GPIO6
    scl: GPIO7
    scan: true
    frequency: 100kHz

# ─── OLED display ────────────────────────────────────────────────────
display:
  - platform: ssd1306_i2c
    id: oled_display
    model: "SSD1306 128x64"
    address: 0x3C
    i2c_id: bus_i2c
    update_interval: 1s
    pages:
      - id: page_main
        lambda: |-
          it.printf(0, 0, id(font_med), "Water PLC v0.3");
          if (id(level_percent).has_state()) {
            it.printf(0, 16, id(font_sm), "JoJo:%.0f%%", id(level_percent).state);
          }
          if (id(cistern_demand).state) {
            it.printf(64, 16, id(font_sm), "PUMP ON");
          } else {
            it.printf(64, 16, id(font_sm), "idle");
          }
          if (id(schedule_active).state) {
            it.printf(0, 32, id(font_sm), "Aviation:ON");
          } else {
            it.printf(0, 32, id(font_sm), "Aviation:OFF");
          }
          it.printf(0, 48, id(font_sm), "%s", id(sntp_time).now().strftime("%H:%M %d/%m").c_str());
font:
  - file: "gfonts://Roboto"
    id: font_sm
    size: 10
  - file: "gfonts://Roboto"
    id: font_med
    size: 14

# ─── UART2 for A02YYUW ultrasonic level sensor ──────────────────────
uart:
  - id: uart_a02
    tx_pin: GPIO21
    rx_pin: GPIO20
    baud_rate: 9600
    rx_buffer_size: 64

# ─── Aviation LEDs (4× discrete 10mm, LEDC PWM @ 1kHz) ──────────────
output:
  - platform: ledc
    pin: GPIO10
    id: aviation_red
    frequency: 1000Hz
  - platform: ledc
    pin: GPIO11
    id: aviation_white
    frequency: 1000Hz
  - platform: ledc
    pin: GPIO12
    id: aviation_blue
    frequency: 1000Hz
  - platform: ledc
    pin: GPIO13
    id: aviation_orange
    frequency: 1000Hz

light:
  - platform: monochromatic
    output: aviation_red
    name: "Aviation Red"
    id: aviation_red_light
    restore_mode: ALWAYS_OFF
  - platform: monochromatic
    output: aviation_white
    name: "Aviation White"
    id: aviation_white_light
    restore_mode: ALWAYS_OFF
  - platform: monochromatic
    output: aviation_blue
    name: "Aviation Blue"
    id: aviation_blue_light
    restore_mode: ALWAYS_OFF
  - platform: monochromatic
    output: aviation_orange
    name: "Aviation Orange"
    id: aviation_orange_light
    restore_mode: ALWAYS_OFF

# ─── Toilet RGB indicator (WS2812B 3mm on GPIO16) ──────────────────
light:
  - platform: neopixelbus
    type: GRB
    variant: WS2812
    pin: GPIO16
    num_leds: 1
    method:
      type: esp32_rmt
      channel: 0
    name: "Toilet Indicator"
    id: toilet_indicator_light
    restore_mode: ALWAYS_OFF

# ─── Level sensor (A02YYUW) ─────────────────────────────────────────
sensor:
  - platform: a02yyuw
    id: level_sensor
    uart_id: uart_a02
    update_interval: 30s
    filters:
      - sliding_window_moving_average:
          window_size: 3
          send_every: 1
  - platform: template
    id: level_percent
    unit_of_measurement: '%'
    accuracy_decimals: 0
    update_interval: 30s
    lambda: |-
      if (id(level_sensor).has_state()) {
        // JoJo 1000L, A02YYUW mounted on lid (~30cm from water when full, ~130cm when empty)
        float d = id(level_sensor).state;
        float pct = (130.0 - d) / 100.0 * 100.0;
        if (pct < 0) pct = 0;
        if (pct > 100) pct = 100;
        return pct;
      }
      return NAN;
  - platform: template
    id: level_liters
    unit_of_measurement: 'L'
    accuracy_decimals: 0
    update_interval: 30s
    lambda: |-
      if (id(level_percent).has_state()) {
        return id(level_percent).state * 10.0;  // 1000L tank
      }
      return NAN;

# ─── Flow meter (YF-S201 on GPIO3) ──────────────────────────────────
  - platform: pulse_counter
    pin: GPIO3
    id: flow_pulse
    unit_of_measurement: 'L/min'
    name: "Water Flow Rate"
    update_interval: 10s
    accuracy_decimals: 1
    filters:
      - multiply: 0.008  # YF-S201: F(Hz) = 7.5 * Q(L/min) → Q = F/7.5
      - sliding_window_moving_average:
          window_size: 3
          send_every: 1
  - platform: total
    id: daily_water_total
    name: "Daily Water Total"
    unit_of_measurement: 'L'
    accuracy_decimals: 0
    update_interval: 60s
    lambda: |-
      return id(flow_pulse).state * (id(flow_pulse).update_interval / 1000.0 / 60.0);
    filters:
      - lambda: |-
          static float total = 0;
          total += x;
          // Reset at midnight
          if (id(sntp_time).now().hour == 0 && id(sntp_time).now().minute == 0) {
            total = 0;
          }
          return total;

# ─── Cistern float switch (GPIO2, INPUT_PULLUP) ─────────────────────
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO2
      mode:
        input: true
        pullup: true
    id: cistern_full
    name: "Cistern Full"
    device_class: occupancy
    filters:
      - delayed_on: 2s
      - delayed_off: 5s

# ─── Manual button (GPIO5) ─────────────────────────────────────────
  - platform: gpio
    pin:
      number: GPIO5
      mode:
        input: true
        pullup: true
    id: btn_jojo_manual
    name: "JoJo Manual Button"
    on_press:
      then:
        - switch.turn_on: jojo_pump_switch
        - delay: 30s
        - switch.turn_off: jojo_pump_switch

# ─── Reset button (GPIO9) ─────────────────────────────────────────
  - platform: gpio
    pin:
      number: GPIO9
      mode:
        input: true
        pullup: true
    name: "Manual Reset"

# ─── System status ──────────────────────────────────────────────────
  - platform: status
    name: "System Status"
  - platform: template
    id: cistern_demand
    name: "Cistern Demand"
    lambda: 'return !id(cistern_full).state;'
  - platform: template
    id: schedule_active
    name: "Schedule Active"
    lambda: |-
      auto now = id(sntp_time).now();
      if (!now.is_valid()) return false;
      int h = now.hour;
      // 17:00–07:00 = hours 17, 18, 19, 20, 21, 22, 23, 0, 1, 2, 3, 4, 5, 6
      return (h >= 17) || (h < 7);
  - platform: template
    id: system_fault
    name: "System Fault"
    lambda: |-
      // Trigger if level sensor hasn't updated in 5min OR cistern float stuck
      static auto last_level_update = id(level_sensor).last_update;
      if (id(sntp_time).now().timestamp - last_level_update > 300) return true;
      return false;

# ─── Pumps ──────────────────────────────────────────────────────────
switch:
  - platform: gpio
    pin: GPIO15
    id: jojo_pump_switch
    name: "JoJo Pump"
    icon: "mdi:water-pump"
    restore_mode: ALWAYS_OFF
    internal: false
  - platform: gpio
    pin: GPIO18
    id: well_pump_switch
    name: "Well Pump"
    icon: "mdi:water-well"
    restore_mode: ALWAYS_OFF
    internal: false
  - platform: template
    name: "JoJo Pump Manual Override"
    id: jojo_pump_override
    lambda: 'return id(jojo_pump_switch).state;'
    turn_on_action:
      - switch.turn_on: jojo_pump_switch
    turn_off_action:
      - switch.turn_off: jojo_pump_switch

# ─── Aviation lights auto-control ───────────────────────────────────
interval:
  - interval: 1s
    then:
      - lambda: |-
          bool active = id(schedule_active).state;
          // Flash patterns (copy of your weather station logic)
          int sec = id(sntp_time).now().second;
          // White: 100ms strobe every 1s
          if (active && (sec < 1)) {
            id(aviation_white_light).set_level(1.0);
          } else {
            id(aviation_white_light).set_level(0.0);
          }
          // Red: 2× 80ms every 2s
          if (active && ((sec >= 0 && sec < 1) || (sec >= 2 && sec < 3))) {
            id(aviation_red_light).set_level(1.0);
          } else {
            id(aviation_red_light).set_level(0.0);
          }
          // Blue: 5Hz flash
          if (active && ((sec * 5) % 10 < 1)) {
            id(aviation_blue_light).set_level(1.0);
          } else {
            id(aviation_blue_light).set_level(0.0);
          }
          // Orange: solid when cistern demand
          if (id(cistern_demand).state) {
            id(aviation_orange_light).set_level(1.0);
          } else {
            id(aviation_orange_light).set_level(0.0);
          }

# ─── WiFi signal ────────────────────────────────────────────────────
sensor:
  - platform: wifi_signal
    name: "WiFi RSSI"
    update_interval: 60s

# ─── Auto-pump control ──────────────────────────────────────────────
interval:
  - interval: 5s
    then:
      - lambda: |-
          // Auto-pump logic:
          // - If cistern demand (float low) AND level > 20% → pump on
          // - If level < 10% OR cistern full → pump off
          // - Schedule: only refill during 17:00-07:00 (overnight) OR manual override
          bool schedule_on = id(schedule_active).state;
          bool demand = id(cistern_demand).state;
          float lvl = id(level_percent).has_state() ? id(level_percent).state : 0;
          bool override = id(jojo_pump_override).state;

          if (override) {
            // Manual override active, leave as user set
            return;
          }

          if (demand && lvl > 20.0 && (schedule_on || lvl < 30.0)) {
            id(jojo_pump_switch).turn_on();
          } else {
            id(jojo_pump_switch).turn_off();
          }
