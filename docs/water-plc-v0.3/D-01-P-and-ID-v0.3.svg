<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 900" width="1500" height="900">
  <defs>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
    <marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0066CC"/>
    </marker>
    <marker id="arrRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#CC0000"/>
    </marker>
    <marker id="arrGrn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#008000"/>
    </marker>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#f0f0f0" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect x="0" y="0" width="1500" height="900" fill="white"/>
  <rect x="0" y="0" width="1500" height="900" fill="none" stroke="#2a2a2a" stroke-width="3"/>
  <rect x="20" y="20" width="1460" height="860" fill="none" stroke="#2a2a2a" stroke-width="1"/>
  <rect x="40" y="50" width="1420" height="780" fill="url(#grid)"/>

  <!-- Header -->
  <rect x="40" y="50" width="1100" height="60" fill="#1f3a5f"/>
  <text x="590" y="85" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold" fill="white">
    P&amp;ID — Domestic Water Replenishment System
  </text>
  <text x="590" y="100" text-anchor="middle" font-family="Arial" font-size="10" fill="#aaccff">
    DAT-WATER-PLC-001 | Rev 0.3 | 2026-07-18 | Sheet 1 of 1
  </text>

  <!-- Section boxes -->
  <rect x="50" y="120" width="280" height="320" fill="#e8f4f8" stroke="#1f3a5f" stroke-width="1.5" rx="4"/>
  <rect x="340" y="120" width="320" height="320" fill="#fffbe6" stroke="#806600" stroke-width="1.5" rx="4"/>
  <rect x="670" y="120" width="400" height="320" fill="#f0e8f8" stroke="#1f3a5f" stroke-width="1.5" rx="4"/>
  <rect x="1080" y="120" width="380" height="320" fill="#f8f0e8" stroke="#5c3317" stroke-width="1.5" rx="4"/>
  <rect x="50" y="455" width="580" height="220" fill="#e8f8f0" stroke="#1f3a5f" stroke-width="1.5" rx="4"/>
  <rect x="640" y="455" width="420" height="220" fill="#ffe6e6" stroke="#CC0000" stroke-width="1.5" rx="4"/>

  <!-- Section headers -->
  <text x="60" y="143" font-family="Arial" font-size="13" font-weight="bold" fill="#1f3a5f">1. WELL POINT</text>
  <text x="350" y="143" font-family="Arial" font-size="13" font-weight="bold" fill="#806600">2. STORAGE</text>
  <text x="680" y="143" font-family="Arial" font-size="13" font-weight="bold" fill="#1f3a5f">3. CONTROL</text>
  <text x="1090" y="143" font-family="Arial" font-size="13" font-weight="bold" fill="#5c3317">4. OUTPUT</text>
  <text x="60" y="478" font-family="Arial" font-size="13" font-weight="bold" fill="#1f3a5f">5. SCHEDULE + STATUS</text>
  <text x="650" y="478" font-family="Arial" font-size="13" font-weight="bold" fill="#CC0000">6. SAFETY</text>

  <!-- === SECTION 1: WELL POINT === -->
  <!-- Ground -->
  <line x1="60" y1="380" x2="330" y2="380" stroke="#8B7355" stroke-width="2"/>
  <text x="100" y="375" font-family="Arial" font-size="9" fill="#8B7355">Ground level</text>
  <!-- Borehole -->
  <rect x="90" y="200" width="40" height="180" fill="#666" stroke="#333" stroke-width="1.5" rx="2"/>
  <text x="110" y="220" text-anchor="middle" font-family="Arial" font-size="8" fill="#aaa" transform="rotate(-90,110,220)">Borehole ~30m</text>
  <!-- Well pump -->
  <circle cx="190" cy="250" r="22" fill="#ddd" stroke="#2a2a2a" stroke-width="1.5"/>
  <text x="190" y="254" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold">P-001</text>
  <rect x="175" y="272" width="30" height="16" fill="#ddd" stroke="#2a2a2a" stroke-width="1"/>
  <text x="190" y="283" text-anchor="middle" font-family="Arial" font-size="7">220V</text>
  <text x="190" y="293" text-anchor="middle" font-family="Arial" font-size="7">0.75kW</text>
  <text x="190" y="160" text-anchor="middle" font-family="Arial" font-size="9" font-weight="bold">Well Pump (EXISTING)</text>
  <!-- Pipe from borehole to pump -->
  <line x1="110" y1="300" x2="168" y2="268" stroke="#444" stroke-width="3" marker-end="url(#arrR)"/>
  <!-- Pipe from pump -->
  <line x1="212" y1="268" x2="340" y2="268" stroke="#444" stroke-width="3" marker-end="url(#arrR)"/>
  <text x="276" y="263" text-anchor="middle" font-family="Arial" font-size="8" fill="#444">HDPE pipe</text>

  <!-- === SECTION 2: STORAGE (JoJo tank) === -->
  <rect x="370" y="200" width="100" height="160" fill="#d0e8f0" stroke="#1f3a5f" stroke-width="2" rx="4"/>
  <text x="420" y="218" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold">JoJo Tank</text>
  <text x="420" y="230" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">~1000L</text>
  <text x="420" y="242" text-anchor="middle" font-family="Arial" font-size="8" fill="#555">Black plastic</text>
  <!-- Water level -->
  <rect x="375" y="280" width="90" height="75" fill="#b0d8f0" opacity="0.6"/>
  <text x="420" y="310" text-anchor="middle" font-family="Arial" font-size="8" fill="#1f3a5f">Water level</text>
  <!-- A02YYUW on lid -->
  <rect x="402" y="195" width="36" height="12" fill="#f4a020" stroke="#d07000" stroke-width="1" rx="2"/>
  <text x="420" y="204" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">A02YYUW</text>
  <line x1="420" y1="207" x2="420" y2="215" stroke="#f4a020" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="420" y="155" text-anchor="middle" font-family="Arial" font-size="8" fill="#f4a020">LIT-001</text>
  <!-- Outlet valve at bottom -->
  <rect x="408" y="355" width="24" height="10" fill="#ccc" stroke="#888" stroke-width="1" rx="2"/>
  <text x="420" y="373" text-anchor="middle" font-family="Arial" font-size="7" fill="#666">1/2" valve</text>
  <!-- Pipe from pump to tank -->
  <line x1="340" y1="268" x2="370" y2="290" stroke="#444" stroke-width="3" marker-end="url(#arrR)"/>
  <!-- Pipe from tank outlet -->
  <line x1="420" y1="365" x2="420" y2="400" stroke="#444" stroke-width="3" marker-end="url(#arrR)"/>
  <line x1="420" y1="400" x2="470" y2="400" stroke="#444" stroke-width="3" marker-end="url(#arrR)"/>

  <!-- === SECTION 3: CONTROL (controller) === -->
  <!-- Controller box -->
  <rect x="700" y="180" width="340" height="240" fill="#f8f0e8" stroke="#5c3317" stroke-width="2" rx="5"/>
  <text x="870" y="200" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">ESP32-C6 Controller</text>
  <text x="870" y="214" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Hammond RP1465C | 12V + 5V PSU</text>
  <!-- Internal components -->
  <rect x="715" y="225" width="80" height="50" fill="#2e5e2e" stroke="#1a3a1a" stroke-width="1" rx="3"/>
  <text x="755" y="242" text-anchor="middle" font-family="Arial" font-size="8" fill="white">Mornsun</text>
  <text x="755" y="254" text-anchor="middle" font-family="Arial" font-size="7" fill="#aaffaa">LM50-23B12R2S</text>
  <text x="755" y="264" text-anchor="middle" font-family="Arial" font-size="7" fill="#aaffaa">50W 12V/4.2A</text>
  <rect x="805" y="225" width="70" height="50" fill="#CC6600" stroke="#993300" stroke-width="1" rx="3"/>
  <text x="840" y="242" text-anchor="middle" font-family="Arial" font-size="8" fill="white">LM2596</text>
  <text x="840" y="254" text-anchor="middle" font-family="Arial" font-size="7" fill="#ffe0b0">Buck 12V→5V</text>
  <text x="840" y="264" text-anchor="middle" font-family="Arial" font-size="7" fill="#ffe0b0">ZUN HAS</text>
  <rect x="885" y="225" width="140" height="50" fill="#1f3a5f" stroke="#0d1f30" stroke-width="1" rx="3"/>
  <text x="955" y="242" text-anchor="middle" font-family="Arial" font-size="8" fill="white">ESP32-C6</text>
  <text x="955" y="254" text-anchor="middle" font-family="Arial" font-size="7" fill="#aaccff">DevKitC-1 N16R8</text>
  <text x="955" y="264" text-anchor="middle" font-family="Arial" font-size="7" fill="#aaccff">19 GPIO | WiFi 6</text>
  <!-- Relay -->
  <rect x="715" y="285" width="100" height="40" fill="#ddd" stroke="#888" stroke-width="1" rx="3"/>
  <text x="765" y="300" text-anchor="middle" font-family="Arial" font-size="8">HL-52S Relay</text>
  <text x="765" y="313" text-anchor="middle" font-family="Arial" font-size="7">220V AC well pump</text>
  <!-- MOSFET -->
  <rect x="825" y="285" width="90" height="40" fill="#ddd" stroke="#888" stroke-width="1" rx="3"/>
  <text x="870" y="300" text-anchor="middle" font-family="Arial" font-size="8">AO3400A</text>
  <text x="870" y="313" text-anchor="middle" font-family="Arial" font-size="7">12V BDD pump</text>
  <!-- OLED -->
  <rect x="925" y="285" width="100" height="40" fill="#1f3a5f" stroke="#0d1f30" stroke-width="1" rx="3"/>
  <text x="975" y="300" text-anchor="middle" font-family="Arial" font-size="8" fill="white">SSD1306 OLED</text>
  <text x="975" y="313" text-anchor="middle" font-family="Arial" font-size="7" fill="#aaccff">0.96" 128×64 I²C</text>
  <!-- DS3231 -->
  <rect x="715" y="335" width="140" height="35" fill="#2e5a2e" stroke="#1a3a1a" stroke-width="1" rx="3"/>
  <text x="785" y="350" text-anchor="middle" font-family="Arial" font-size="8" fill="white">DS3231 RTC (ZS-042)</text>
  <text x="785" y="362" text-anchor="middle" font-family="Arial" font-size="7" fill="#aaffaa">±2 ppm | CR2032 | I²C 0x68</text>
  <!-- YF-S201 -->
  <rect x="865" y="335" width="90" height="35" fill="#f4a020" stroke="#d07000" stroke-width="1" rx="3"/>
  <text x="910" y="350" text-anchor="middle" font-family="Arial" font-size="8" fill="#333">YF-S201</text>
  <text x="910" y="362" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">Flow meter</text>

  <!-- === SECTION 4: OUTPUT (toilet cistern + LEDs) === -->
  <!-- Wall symbol -->
  <line x1="1100" y1="200" x2="1100" y2="380" stroke="#888" stroke-width="3"/>
  <text x="1105" y="210" font-family="Arial" font-size="8" fill="#888">Wall</text>
  <!-- Cistern (wall-mounted toilet) -->
  <rect x="1120" y="230" width="120" height="100" fill="#e8e8e8" stroke="#666" stroke-width="2" rx="6"/>
  <rect x="1130" y="240" width="100" height="55" fill="#d8d8d8" stroke="#aaa" stroke-width="1" rx="3"/>
  <text x="1180" y="262" text-anchor="middle" font-family="Arial" font-size="7" fill="#555"> Cistern</text>
  <text x="1180" y="272" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">11-12L VAAL</text>
  <text x="1180" y="282" text-anchor="middle" font-family="Arial" font-size="7" fill="#555">Wall-mount</text>
  <!-- Float switch on cistern lid -->
  <rect x="1170" y="220" width="20" height="14" fill="#009900" stroke="#006600" stroke-width="1" rx="3"/>
  <text x="1180" y="230" text-anchor="middle" font-family="Arial" font-size="7" fill="white">FS</text>
  <line x1="1180" y1="234" x2="1180" y2="240" stroke="#009900" stroke-width="1"/>
  <text x="1200" y="215" font-family="Arial" font-size="8" fill="#009900">LSH-001</text>
  <!-- Cistern pipe in -->
  <line x1="470" y1="400" x2="1120" y2="265" stroke="#444" stroke-width="3" stroke-dasharray="none" marker-end="url(#arrR)"/>
  <text x="790" y="395" text-anchor="middle" font-family="Arial" font-size="8" fill="#444">15mm HDPE | ~1.5m rise</text>
  <!-- BDD pump on pipe -->
  <circle cx="580" cy="400" r="20" fill="#CC6600" stroke="#993300" stroke-width="1.5"/>
  <text x="580" y="396" text-anchor="middle" font-family="Arial" font-size="7" font-weight="bold" fill="white">P-002</text>
  <text x="580" y="407" text-anchor="middle" font-family="Arial" font-size="6" fill="white">BDD 12V</text>
  <text x="580" y="430" text-anchor="middle" font-family="Arial" font-size="8" fill="#CC6600">BDD Pump (external, gravity-fed)</text>
  <!-- Aviation LEDs -->
  <rect x="1100" y="350" width="30" height="22" fill="#CC0000" stroke="#880000" stroke-width="1.5" rx="3"/>
  <text x="1115" y="365" text-anchor="middle" font-family="Arial" font-size="7" fill="white">LED</text>
  <rect x="1135" y="350" width="30" height="22" fill="#ffffff" stroke="#aaa" stroke-width="1.5" rx="3"/>
  <text x="1150" y="365" text-anchor="middle" font-family="Arial" font-size="7" fill="#333">LED</text>
  <rect x="1170" y="350" width="30" height="22" fill="#0044CC" stroke="#002288" stroke-width="1.5" rx="3"/>
  <text x="1185" y="365" text-anchor="middle" font-family="Arial" font-size="7" fill="white">LED</text>
  <rect x="1205" y="350" width="30" height="22" fill="#FF8800" stroke="#cc5500" stroke-width="1.5" rx="3"/>
  <text x="1220" y="365" text-anchor="middle" font-family="Arial" font-size="7" fill="white">LED</text>
  <text x="1180" y="383" text-anchor="middle" font-family="Arial" font-size="8" fill="#666">Aviation lights — interface panel</text>
  <text x="1180" y="395" text-anchor="middle" font-family="Arial" font-size="7" fill="#CC6600">GPIO10/11/12/13 | 17:00-07:00</text>

  <!-- === SECTION 5: SCHEDULE + STATUS === -->
  <!-- Schedule box -->
  <rect x="60" y="490" width="220" height="110" fill="#fffbe6" stroke="#806600" stroke-width="1.5" rx="4"/>
  <text x="170" y="510" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#806600">TIME SCHEDULE</text>
  <text x="170" y="528" text-anchor="middle" font-family="Arial" font-size="10" fill="#333">Refill window:</text>
  <text x="170" y="548" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#1f3a5f">17:00 → 07:00</text>
  <text x="170" y="565" text-anchor="middle" font-family="Arial" font-size="9" fill="#555">NTP sync + DS3231 backup</text>
  <text x="170" y="582" text-anchor="middle" font-family="Arial" font-size="8" fill="#888">Daily automatic</text>
  <!-- Home Assistant box -->
  <rect x="295" y="490" width="320" height="110" fill="#e8f4f8" stroke="#1f3a5f" stroke-width="1.5" rx="4"/>
  <text x="455" y="510" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#1f3a5f">HOME ASSISTANT INTEGRATION</text>
  <text x="310" y="530" font-family="Arial" font-size="9" fill="#333">• sensor.jojo_level_percent | sensor.jojo_level_liters</text>
  <text x="310" y="546" font-family="Arial" font-size="9" fill="#333">• sensor.water_flow_rate_lpm | sensor.daily_water_liters</text>
  <text x="310" y="562" font-family="Arial" font-size="9" fill="#333">• binary_sensor.cistern_full | binary_sensor.cistern_demand</text>
  <text x="310" y="578" font-family="Arial" font-size="9" fill="#333">• switch.jojo_pump_override | switch.well_pump</text>
  <text x="310" y="594" font-family="Arial" font-size="9" fill="#333">• light.aviation_lights (GPIO10-13) | light.toilet_indicator</text>
  <!-- Legend -->
  <rect x="640" y="490" width="400" height="170" fill="#f8f8f8" stroke="#2a2a2a" stroke-width="1.5" rx="4"/>
  <text x="650" y="510" font-family="Arial" font-size="11" font-weight="bold" fill="#2a2a2a">LEGEND</text>
  <!-- Pipe symbols -->
  <line x1="650" y1="530" x2="700" y2="530" stroke="#444" stroke-width="3"/>
  <text x="710" y="533" font-family="Arial" font-size="9">Process pipe (HDPE, 15mm)</text>
  <line x1="650" y1="550" x2="700" y2="550" stroke="#0066CC" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="710" y="553" font-family="Arial" font-size="9">Electrical signal (GPIO)</text>
  <line x1="650" y1="570" x2="700" y2="570" stroke="#CC0000" stroke-width="2" stroke-dasharray="2,2"/>
  <text x="710" y="573" font-family="Arial" font-size="9">UART / I²C data</text>
  <!-- P&ID symbols -->
  <circle cx="665" cy="595" r="10" fill="#ddd" stroke="#444" stroke-width="1"/>
  <text x="665" y="598" text-anchor="middle" font-family="Arial" font-size="7">P</text>
  <text x="685" y="598" font-family="Arial" font-size="9">Pump</text>
  <rect x="760" y="587" width="16" height="16" fill="#f4a020" stroke="#d07000" stroke-width="1" rx="2"/>
  <text x="786" y="598" font-family="Arial" font-size="9">Sensor / Instrument</text>
  <circle cx="665" cy="625" r="10" fill="#009900" stroke="#006600" stroke-width="1"/>
  <text x="665" y="628" text-anchor="middle" font-family="Arial" font-size="7">LS</text>
  <text x="685" y="628" font-family="Arial" font-size="9">Level Switch</text>
  <!-- Color key -->
  <rect x="880" y="525" width="20" height="12" fill="#CC0000" stroke="#880000"/>
  <text x="908" y="535" font-family="Arial" font-size="9">+12V power</text>
  <rect x="880" y="545" width="20" height="12" fill="#FF8800" stroke="#cc5500"/>
  <text x="908" y="555" font-family="Arial" font-size="9">+5V power</text>
  <rect x="880" y="565" width="20" height="12" fill="#0066CC" stroke="#003366"/>
  <text x="908" y="575" font-family="Arial" font-size="9">Signal (GPIO/UART)</text>
  <rect x="880" y="585" width="20" height="12" fill="#444" stroke="#222"/>
  <text x="908" y="595" font-family="Arial" font-size="9">Mains 220V AC</text>
  <rect x="880" y="605" width="20" height="12" fill="#ddd" stroke="#888"/>
  <text x="908" y="615" font-family="Arial" font-size="9">Controller / PSU</text>

  <!-- Title block -->
  <rect x="1150" y="700" width="310" height="120" fill="white" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="1150" y1="728" x2="1460" y2="728" stroke="#2a2a2a"/>
  <line x1="1150" y1="748" x2="1460" y2="748" stroke="#2a2a2a"/>
  <line x1="1150" y1="768" x2="1460" y2="768" stroke="#2a2a2a"/>
  <line x1="1150" y1="788" x2="1460" y2="788" stroke="#2a2a2a"/>
  <line x1="1295" y1="700" x2="1295" y2="820" stroke="#2a2a2a"/>
  <line x1="1377" y1="700" x2="1377" y2="820" stroke="#2a2a2a"/>
  <text x="1158" y="716" font-family="Arial" font-size="9" font-weight="bold">Drawing D-01</text>
  <text x="1303" y="716" font-family="Arial" font-size="9" font-weight="bold">Rev 0.3</text>
  <text x="1385" y="716" font-family="Arial" font-size="9" font-weight="bold">2026-07-18</text>
  <text x="1158" y="739" font-family="Arial" font-size="8">P&amp;ID — Domestic Water Replenishment</text>
  <text x="1303" y="739" font-family="Arial" font-size="8">Sheet 1 of 1</text>
  <text x="1385" y="739" font-family="Arial" font-size="8">Misha</text>
  <text x="1158" y="759" font-family="Arial" font-size="8">Scale 1:50 | Grid 10mm</text>
  <text x="1158" y="779" font-family="Arial" font-size="8">DAT-WATER-PLC-001 | v0.3-Misha</text>
</svg>