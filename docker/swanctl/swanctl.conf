# swanctl.conf — top-level config
# Includes everything in conf.d/. Per-conn files live there.

include conf.d/*.conf

pools {
  rw-pool {
    addrs = 10.99.0.0/24
    dns   = 1.1.1.1, 8.8.8.8
  }
}

# secrets block lives INSIDE each conf.d/*.conf (swanctl semantics).
# Per-deployment secrets are NOT in git — see docker/swanctl/conf.d/README.md
