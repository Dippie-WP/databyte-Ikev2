# 00-virtual-ip.conf — charon override for gateway deployments
#
# Why this exists (5A.6, 2026-06-18):
# charon's DEFAULT `install_virtual_ip = yes` adds the assigned VIP (e.g.
# 10.99.0.50) as a LOCAL address on lo. The kernel's local routing table
# has priority 0, BEFORE table 220 (strongSwan's policy routing). So
# traffic FROM 10.99.0.50 is routed to the local stack instead of via
# table 220 → eth0 → MASQ. Packets die at the local stack.
#
# Symptom: SA ESTABLISHED, ESP in counter high, ESP out counter 0,
# conntrack from 10.99.0.50 = 0 for fresh connections.
#
# `install_routes = yes` is the OTHER half of the fix: even without the
# local IP, charon still installs the route 10.99.0.50/32 via 192.168.10.1
# src %any dev eth0, so the kernel knows the next hop.
#
# Default `install_virtual_ip = yes` is the strongSwan CLIENT default.
# For a GATEWAY, you want `no` (the VIP belongs to the REMOTE client, not
# the gateway). This is the single most important charon override for
# any strongSwan gateway deployment — default is wrong for us.
#
# BIND-MOUNT WARNING: This file MUST be bind-mounted into the container
# at /etc/strongswan.d/00-virtual-ip.conf for charon to see it. The
# docker-compose.yml volumes block has the bind-mount line. If you see
# `charon_log_line: "10.99.0.50 appeared on lo"` after a connection,
# the file is not loaded.
charon {
    install_virtual_ip = no
    install_routes = yes
}
