# 10-eap-radius.conf — Phase 5 RADIUS backend config
#
# When: 2026-07-06 Phase 5 cutover (charon local EAP secrets → FreeRADIUS backend)
# Why:  Phase 4 wired the portal to write radcheck rows on customer lifecycle.
#       Phase 5 switches charon auth = eap-mschapv2 → auth = eap-radius so all
#       EAP-MSCHAPv2 lookups go to FreeRADIUS → MariaDB radcheck (no plaintext
#       secrets in charon config, single source of truth, portal-driven customer
#       lifecycle).
#
# Where this file lives:
#   - Host repo:  /root/projects/strongswan-vpn-gateway/docker/strongswan.d/10-eap-radius.conf
#   - Bind-mount: ./strongswan.d/10-eap-radius.conf:/etc/strongswan.d/10-eap-radius.conf:ro
#   - Container:  /etc/strongswan.d/10-eap-radius.conf (read by charon at startup)
#
# strongswan.conf includes `include strongswan.d/*.conf` so this overlay merges
# with the upstream plugin defaults at /etc/strongswan.d/charon/eap-radius.conf.
#
# Critical config values:
#   - server = 127.0.0.1   (FreeRADIUS lives on the same VPS, in its own container
#                            at 192.168.10.89's address? NO — FreeRADIUS is on THIS VPS
#                            via apt package, listening on 127.0.0.1:1812)
#   - secret = the FreeRADIUS shared secret for client localhost (IPv4)
#   - File mode 0644 is FINE because strongswan.d/*.conf is world-readable by
#     convention; the secret is in /etc/freeradius/daloRADIUS.key (mode 0640
#     freerad:freerad) on the FreeRADIUS side. Anyone who can read this file
#     already has shell on the VPS.
#
# Required matching secret: /etc/freeradius/3.0/clients.conf (IPv4 localhost block)
#                           /etc/freeradius/daloRADIUS.key
# Both contain: 9f32746a2845c1ba72d2b60f71631c61dc24f496c85548f38c8d828839a0ebd2
# (Verified byte-level 2026-07-06 00:33 UTC — radtest with correct secret → Access-Accept.)
#
# Failure mode: if secret mismatches, charon eap-radius gets rejected, all customers
# locked out. The clients.conf secret diagnostic on 2026-07-05 was a USER ERROR
# (radtest passed wrong secret). The actual config has always been correct.
#
# Maintenance:
#   - On secret rotation: update BOTH this file AND /etc/freeradius/3.0/clients.conf
#     AND /etc/freeradius/daloRADIUS.key. Then `docker restart strongswan` +
#     `systemctl restart freeradius`.
#   - On adding a secondary RADIUS server: add to `servers { }` block below.

charon {
    plugins {
        eap-radius {
            load = yes
            secret = "9f32746a2845c1ba72d2b60f71631c61dc24f496c85548f38c8d828839a0ebd2"
            server = 127.0.0.1
            # Send RADIUS Accounting-Request packets to the acct_port (1813).
            # Upstream default is "no" — without this, no radacct rows are
            # generated, breaking bandwidth-monitor.py and any per-SS usage
            # analytics. Required by Phase 4A radacct-driven quota pipeline.
            accounting = yes
            # Interim accounting every 5 minutes (300s). FreeRADIUS will receive
            # Accounting-Update packets and update radacct.acctupdatetime +
            # input/output octet counters. Lets bandwidth-monitor see fresh
            # numbers without waiting for session disconnect.
            accounting_interval = 300
            # Don't append the source UDP port to Calling-Station-Id. Default
            # "yes" produces "160.242.18.238[9617]" which gets RFC6733
            # quote-encoded to "160.242.18.238=5B9617=5D" when stored in
            # MariaDB. Setting "no" yields a clean IPv4/IPv6 in the
            # devices.last_seen_v4 column.
            station_id_with_port = no
            # Multiple-server block. Single primary now; can add HA later.
            servers {
                primary {
                    address = 127.0.0.1
                    secret = "9f32746a2845c1ba72d2b60f71631c61dc24f496c85548f38c8d828839a0ebd2"
                    auth_port = 1812
                    acct_port = 1813
                }
            }
            # RFC 5176 Dynamic Authorization Extension. quota-monitor.py
            # sends Disconnect-Request (code 40) here when a customer
            # hits 100% data cap. charon matches User-Name against active
            # IKE_SAs and sends IKE DELETE INFORMATIONAL — clean,
            # standards-based termination. Replaces (or complements)
            # `swanctl --terminate --ike-id` so the client sees a
            # proper INFO DELETE in the charon log and iOS/Android
            # state cleanly transitions. Bound to 127.0.0.1 only; the
            # FreeRADIUS DAE listener is NOT used here — we send
            # directly from quota-monitor, no CoA proxy involved.
            dae {
                enable = yes
                listen = 127.0.0.1
                port = 3799
                secret = "b305c63a5010d2c309e29df7bab0fe66"
            }
        }
    }
}
# ^ DAE secret generated 2026-07-06 14:11 UTC via `openssl rand -hex 16`.
#   Stored on the VPS at /root/.strongswan-dae-secret (mode 0600 root:root).
#   This value MUST stay in sync with that file. Rotation:
#     1. openssl rand -hex 16 > /tmp/new_dae_secret
#     2. update dae.secret here AND /root/.strongswan-dae-secret
#     3. docker restart strongswan
#     4. python3 /home/zunaid/strongswan/quota/vpn_disconnect.py <test-user>