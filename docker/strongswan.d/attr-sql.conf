# attr-sql.conf — per-identity VIP pinning via SQLite
#
# Database path is INSIDE the container at /var/lib/strongswan/ipsec.db
# (bind-mounted from the LXC host at /var/lib/strongswan/). The DB
# schema is upstream strongSwan's src/pool/sqlite.sql (25 CREATE TABLE
# statements, ~30 tables total).
#
# Key tables for VIP pinning:
#   - pools          (id, name, addr_subnet, dns, etc.)
#   - identities     (id, type, data — the EAP user/PSK identity)
#   - user_pools     (links identity to pool, for DNS attributes)
#   - addresses      (id, address, identity, released — the actual leases;
#                     "released=0" = currently held, "released=1" = free)
#
# IMPORTANT: VIP pinning is via the `addresses` table with the `identity`
# column, NOT via `user_pools`. user_pools is for DNS attributes. The
# "pin" is a row in `addresses` with `identity=X, released=0` for that
# specific VIP (e.g. 10.99.0.50) BEFORE the client connects. charon
# picks it up on first use and reuses on subsequent uses ("sticky").
#
# Hard pin (released=0 always, never reused for another user) requires
# custom attr-sql logic — not in upstream. Phase 5B/C may add it.
#
# DB initializes on FIRST QUERY, not first start. The dir appears empty
# until `swanctl --list-pools` triggers initialization. Don't be alarmed
# by empty /var/lib/strongswan/ on a fresh deploy.
charon {
    plugins {
        attr-sql {
            database = sqlite:///var/lib/strongswan/ipsec.db
            crash_recovery = yes
            lease_history = yes
        }
    }
}
