# debug.conf — verbose charon logging to bind-mounted host file
#
# Path: /var/log/charon-filog.log inside the container
#       = /var/log/charon-log-host/charon.log on the LXC host
#       (bind-mounted via docker-compose.yml)
#
# Useful during install + first-time tests. In production, comment out
# or set ike=0 cfg=0 knl=0 (default 1).
charon {
    filelog {
        charon-filog {
            path = /var/log/charon-filog.log
            time_format = %Y-%m-%d %H:%M:%S
            ike = 2
            cfg = 2
            knl = 2
            append = yes
            default = 1
        }
    }
}
