# strongswan.conf — baked into image at /etc/strongswan.conf
#
# 2026-06-16 r5 changes (REVERTING r4's vici socket format):
#   - The vici plugin's `socket` key is a SINGLE value (get_str, not a list)
#     per the strongSwan 6.0.7 source. Specifying it twice = last wins.
#   - Using TCP socket (127.0.0.1:4502) for the ipsec-prometheus-exporter
#     sidecar, and ALL swanctl invocations in this container use the TCP
#     URI via --uri flag. Unix socket is NOT used (single socket per charon).
#   - The start-scripts also need --uri=tcp://127.0.0.1:4502 since the
#     default URI (unix:///var/run/charon.vici) won't exist.
#   - Verified: this works because TCP 127.0.0.1:4502 is loopback-only,
#     reachable from inside the container (network_mode: host means we
#     share the LXC host's network namespace).

# Include any operator-provided overrides from /etc/strongswan.d/
include strongswan.d/*.conf

charon {
    # Auto-load credentials, connections, and pools once VICI is up.
    # All swanctl calls use the TCP URI (since the unix socket doesn't exist).
    start-scripts {
        creds = /usr/sbin/swanctl --uri=tcp://127.0.0.1:4502 --load-creds
        conns = /usr/sbin/swanctl --uri=tcp://127.0.0.1:4502 --load-conns
        pools = /usr/sbin/swanctl --uri=tcp://127.0.0.1:4502 --load-pools
    }

    # VICI plugin — listen on TCP loopback only. Single value (get_str).
    plugins {
        vici {
            socket = tcp://127.0.0.1:4502
        }
    }

    # Filelog: writes charon-log to /var/log/charon-log inside the container.
    # Ephemeral (lost on container recreate). Operator's strongswan.d/*.conf
    # can override these settings.
    filelog {
        /var/log/charon-log {
            default = 1
            ike = 2
            knl = 3
            cfg = 2
        }
    }
}
